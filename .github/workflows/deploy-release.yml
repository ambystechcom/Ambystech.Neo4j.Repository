name: Deploy Main Repository Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'contracts/**'
      - 'site/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      nuget_version: ${{ steps.gitversion.outputs.NuGetVersion }}
      major_minor_patch: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      is_prerelease: ${{ contains(steps.gitversion.outputs.nuGetVersionV2, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.7
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.7
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
      
      - name: Restore dependencies
        run: dotnet restore Ambystech.Neo4j.Repository.csproj
        working-directory: lib
      
      - name: Build
        run: dotnet build Ambystech.Neo4j.Repository.csproj --configuration Release --no-restore
        working-directory: lib
      
      - name: Pack
        run: dotnet pack lib/Ambystech.Neo4j.Repository.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.gitversion.outputs.NuGetVersion }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-release
          path: ./artifacts/*.nupkg

  publish-release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package-release
          path: ./artifacts

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create Git Tag
        id: create_tag
        run: |
          TAG="v${{ needs.deploy.outputs.major_minor_patch }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git tag -a "$TAG" -m "Release v${{ needs.deploy.outputs.major_minor_patch }}"
            git push origin "$TAG"
            echo "tag_created=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate Changelog
        id: changelog
        if: steps.create_tag.outputs.tag_created == 'true'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match "v*" --exclude "v*-preview-*" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        if: steps.create_tag.outputs.tag_created == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          name: Release v${{ needs.deploy.outputs.major_minor_patch }}
          body: |
            ## Changes in this Release

            ${{ steps.changelog.outputs.changelog }}

            ## NuGet Package

            This release is available on NuGet.org:
            ```
            dotnet add package Ambystech.Neo4j.Repository --version ${{ needs.deploy.outputs.nuget_version }}
            ```
          files: ./artifacts/Ambystech.Neo4j.Repository.${{ needs.deploy.outputs.nuget_version }}.nupkg
          draft: false
          prerelease: false

